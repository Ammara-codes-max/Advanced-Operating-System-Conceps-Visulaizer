<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | OS Concepts Visualizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      background: radial-gradient(circle at top left, #0f2027, #020617 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Floating background blobs */
    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #00f5ff, #0077ff);
      filter: blur(120px);
      opacity: 0.3;
      animation: float 12s infinite alternate ease-in-out;
    }

    .blob.one { top: -100px; left: -100px; }
    .blob.two { bottom: -120px; right: -120px; animation-delay: 3s; }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(-60px); }
    }

    /* Login Card */
    .login-card {
      width: 380px;
      padding: 35px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      animation: fadeInUp 0.9s ease;
      z-index: 10;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card h3 {
      text-align: center;
      margin-bottom: 25px;
      color: #00f5ff;
      font-weight: 600;
    }

    /* Floating labels */
    .form-floating input {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .form-floating label {
      color: #aaa;
    }

    .form-floating input:focus {
      border-color: #00f5ff;
      box-shadow: none;
    }

    /* Button */
    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00f5ff, #0077ff);
      border: none;
      border-radius: 10px;
      color: #000;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,245,255,0.4);
    }

    .login-footer {
      margin-top: 15px;
      text-align: center;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>

<body>

<!-- Animated background -->
<div class="blob one"></div>
<div class="blob two"></div>

<!-- Login Card -->
<div class="login-card">
  <h3><i class="bi bi-shield-lock"></i> Secure Login</h3>

  <form method="POST" action="/login">

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
      <label for="username"><i class="bi bi-person"></i> Username</label>
    </div>

    <div class="form-floating mb-4">
      <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
      <label for="password"><i class="bi bi-lock"></i> Password</label>
    </div>

    <button class="btn-login">Login</button>

  </form>

  <div class="login-footer">
    OS Concepts Visualizer © 2026
  </div>
</div>

</body>
</html>
